<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>磷警示 — AI血磷飲食辨識</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e14;
    --card: #161e28;
    --border: #1e2d3d;
    --accent: #00d4aa;
    --warn: #ff6b35;
    --danger: #ff2d55;
    --safe: #34c759;
    --gold: #ffd60a;
    --text: #e8f0f8;
    --muted: #6b7f94;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans TC', -apple-system, sans-serif;
    min-height: 100vh;
    padding: 0 0 60px;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(0,212,170,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,170,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none; z-index: 0;
  }
  .container { max-width: 680px; margin: 0 auto; padding: 20px 16px; position: relative; z-index: 1; }

  .header { text-align: center; padding: 20px 0 18px; animation: pop .5s ease both; }
  .badge {
    display: inline-flex; align-items: center; gap: 7px;
    background: rgba(0,212,170,.1); border: 1px solid rgba(0,212,170,.3);
    border-radius: 100px; padding: 5px 15px; font-size: 11px;
    color: var(--accent); letter-spacing: 2px; margin-bottom: 12px;
  }
  .badge-dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; animation: glow 2s infinite; }
  h1 { font-size: clamp(26px, 6vw, 36px); font-weight: 900; letter-spacing: -1px; line-height: 1.15; }
  h1 span { color: var(--accent); }
  .subtitle { margin-top: 8px; color: var(--muted); font-size: 13px; line-height: 1.8; font-weight: 300; }

  .upload-zone {
    border: 2px dashed var(--border);
    border-radius: 18px;
    padding: 48px 20px;
    text-align: center;
    cursor: pointer;
    background: var(--card);
    transition: all .25s;
    animation: pop .5s .1s ease both;
  }
  .upload-zone:active, .upload-zone.drag {
    border-color: var(--accent);
    background: rgba(0,212,170,.04);
  }
  .upload-ico { font-size: 42px; margin-bottom: 10px; display: block; }
  .upload-t { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
  .upload-h { font-size: 12px; color: var(--muted); }

  .preview { border-radius: 16px; overflow: hidden; margin-bottom: 10px; position: relative; animation: pop .4s ease both; }
  .preview img { width: 100%; max-height: 280px; object-fit: cover; display: block; }
  .preview-bar {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: linear-gradient(transparent, rgba(10,14,20,.93));
    padding: 20px 16px 14px;
    display: flex; justify-content: flex-end;
  }
  .btn-small {
    background: rgba(255,255,255,.1);
    border: 1px solid rgba(255,255,255,.15);
    color: var(--text);
    border-radius: 8px; padding: 7px 14px; font-size: 12px;
    cursor: pointer; font-family: inherit;
  }

  .btn-main {
    width: 100%; background: var(--accent); color: #0a0e14;
    border: none; border-radius: 13px; padding: 16px;
    font-size: 16px; font-weight: 700; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    gap: 8px; font-family: inherit; transition: all .2s;
    animation: pop .4s ease both;
  }
  .btn-main:active { transform: scale(.98); }
  .btn-main:disabled { opacity: .5; cursor: not-allowed; }

  .loading {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 18px; padding: 32px 24px; text-align: center;
    animation: pop .4s ease both;
  }
  .spinner {
    width: 48px; height: 48px;
    border: 3px solid var(--border); border-top-color: var(--accent);
    border-radius: 50%; margin: 0 auto 14px;
    animation: spin 1s linear infinite;
  }
  .loading-t { color: var(--muted); font-size: 14px; margin-bottom: 18px; }
  .step { font-size: 12px; margin-bottom: 6px; transition: color .4s; display: flex; align-items: center; justify-content: center; gap: 6px; color: var(--border); }
  .step.cur { color: var(--accent); }
  .step.done { color: var(--safe); }

  .error {
    background: rgba(255,45,85,.06);
    border: 1px solid rgba(255,45,85,.2);
    border-radius: 16px; padding: 24px; text-align: center;
    animation: pop .4s ease both;
  }
  .error-ico { font-size: 34px; margin-bottom: 10px; }
  .error-msg { color: #ff9999; font-size: 14px; line-height: 1.8; margin-bottom: 14px; }
  .error-det { font-size: 11px; color: var(--muted); margin-top: 6px; word-break: break-all; }
  .btn-ghost {
    background: transparent; border: 1px solid var(--border);
    color: var(--muted); border-radius: 10px; padding: 10px 22px;
    font-size: 13px; cursor: pointer; font-family: inherit;
  }
  .btn-ghost:active { transform: scale(.98); }

  .result { display: flex; flex-direction: column; gap: 10px; animation: pop .5s ease both; }
  .risk-banner {
    border-radius: 16px; padding: 20px 22px;
    display: flex; align-items: center; gap: 16px;
  }
  .risk-banner.high { background: rgba(255,45,85,.08); border: 1px solid rgba(255,45,85,.3); }
  .risk-banner.medium { background: rgba(255,214,10,.07); border: 1px solid rgba(255,214,10,.3); }
  .risk-banner.low { background: rgba(52,199,89,.08); border: 1px solid rgba(52,199,89,.3); }
  .risk-ico { font-size: 38px; flex-shrink: 0; }
  .risk-label { font-size: 11px; letter-spacing: 2px; margin-bottom: 3px; }
  .risk-banner.high .risk-label { color: var(--danger); }
  .risk-banner.medium .risk-label { color: var(--gold); }
  .risk-banner.low .risk-label { color: var(--safe); }
  .risk-title { font-size: 20px; font-weight: 800; }
  .risk-sub { font-size: 13px; color: var(--muted); margin-top: 3px; }

  .meter {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 13px; padding: 15px 18px;
  }
  .meter-head { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 10px; }
  .meter-bar { height: 9px; background: var(--border); border-radius: 100px; overflow: hidden; }
  .meter-fill { height: 100%; border-radius: 100px; transition: width 1.2s cubic-bezier(.34,1.56,.64,1); }
  .meter-fill.high { background: linear-gradient(90deg, var(--warn), var(--danger)); }
  .meter-fill.medium { background: linear-gradient(90deg, var(--gold), var(--warn)); }
  .meter-fill.low { background: linear-gradient(90deg, var(--accent), var(--safe)); }
  .meter-marks { display: flex; justify-content: space-between; margin-top: 5px; font-size: 10px; color: var(--muted); }

  .section-lbl { font-size: 11px; letter-spacing: 2px; color: var(--muted); margin-bottom: 7px; }
  .food { background: var(--card); border: 1px solid var(--border); border-radius: 11px; padding: 12px 15px; display: flex; align-items: center; gap: 12px; margin-bottom: 6px; }
  .fdot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .fdot.high { background: var(--danger); box-shadow: 0 0 5px var(--danger); }
  .fdot.medium { background: var(--gold); box-shadow: 0 0 5px var(--gold); }
  .fdot.low { background: var(--safe); box-shadow: 0 0 5px var(--safe); }
  .fname { flex: 1; min-width: 0; }
  .fname-t { font-size: 14px; font-weight: 500; }
  .fname-p { font-size: 11px; color: var(--muted); }
  .fphos { font-size: 12px; color: var(--muted); text-align: right; }
  .fphos-v { font-size: 14px; color: var(--text); font-weight: 500; }
  .ftag { font-size: 10px; padding: 3px 9px; border-radius: 100px; white-space: nowrap; }
  .ftag.high { background: rgba(255,45,85,.15); color: var(--danger); }
  .ftag.medium { background: rgba(255,214,10,.12); color: var(--gold); }
  .ftag.low { background: rgba(52,199,89,.12); color: var(--safe); }

  .drug {
    background: rgba(255,107,53,.06); border: 1px solid rgba(255,107,53,.22);
    border-radius: 12px; padding: 14px 18px; display: flex; align-items: center; gap: 13px;
  }
  .drug-ico { font-size: 26px; flex-shrink: 0; }
  .drug-t { font-size: 13px; line-height: 1.75; color: #e8c8b8; }
  .drug-t strong { color: var(--warn); }

  .advice {
    background: var(--card); border-left: 3px solid var(--accent);
    border-top: 1px solid var(--border); border-right: 1px solid var(--border); border-bottom: 1px solid var(--border);
    border-radius: 11px; padding: 16px 18px;
  }
  .advice-h { font-size: 11px; color: var(--accent); letter-spacing: 1.5px; margin-bottom: 9px; }
  .advice-t { font-size: 14px; line-height: 1.8; color: #c8d8e8; }

  .alts { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .alt {
    background: rgba(0,212,170,.05); border: 1px solid rgba(0,212,170,.15);
    border-radius: 11px; padding: 13px 15px;
  }
  .alt-h { font-size: 10px; color: var(--accent); margin-bottom: 4px; }
  .alt-n { font-size: 14px; font-weight: 600; margin-bottom: 3px; }
  .alt-d { font-size: 11px; color: var(--muted); line-height: 1.6; }

  .footer { text-align: center; font-size: 11px; color: var(--muted); margin-top: 26px; border-top: 1px solid var(--border); padding-top: 18px; line-height: 1.9; opacity: .7; }

  @keyframes pop { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes glow { 0%,100% { opacity: 1; } 50% { opacity: .4; } }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="badge">
      <div class="badge-dot"></div>
      AI PHOSPHORUS DETECTOR
    </div>
    <h1>磷 <span>警示</span> 飲食辨識</h1>
    <p class="subtitle">專為血液透析患者設計<br>上傳餐點照片，AI即時分析磷含量風險</p>
  </div>

  <!-- Upload -->
  <div id="stage-upload" class="upload-zone" onclick="document.getElementById('fi').click()">
    <span class="upload-ico">📸</span>
    <div class="upload-t">點擊選擇餐點照片</div>
    <div class="upload-h">支援 JPG、PNG、WEBP</div>
    <input type="file" id="fi" accept="image/*" style="display:none;">
  </div>

  <!-- Preview -->
  <div id="stage-preview" style="display:none;">
    <div class="preview">
      <img id="pv-img">
      <div class="preview-bar">
        <button class="btn-small" onclick="reset()">更換照片</button>
      </div>
    </div>
    <button class="btn-main" onclick="analyze()">🔬 開始 AI 血磷分析</button>
  </div>

  <!-- Loading -->
  <div id="stage-loading" class="loading" style="display:none;">
    <div class="spinner"></div>
    <div class="loading-t">AI 正在辨識您的餐點...</div>
    <div id="steps">
      <div class="step" id="s1">▸ 解析影像內容</div>
      <div class="step" id="s2">▸ 辨識食物種類</div>
      <div class="step" id="s3">▸ 計算磷含量風險</div>
      <div class="step" id="s4">▸ 生成個人化建議</div>
    </div>
  </div>

  <!-- Error -->
  <div id="stage-error" class="error" style="display:none;">
    <div class="error-ico">⚠️</div>
    <div class="error-msg">
      分析時發生錯誤，請稍後再試<br>
      <span class="error-det" id="err-det"></span>
    </div>
    <button class="btn-ghost" onclick="reset()">重新嘗試</button>
  </div>

  <!-- Result -->
  <div id="stage-result" style="display:none;"></div>

  <div class="footer">
    本工具僅供衛教輔助參考，不取代醫療團隊之臨床判斷<br>
    磷含量數值為估算值，透析患者請依醫師指示進行飲食管理
  </div>

</div>

<script>
// ⚠️ 已設定為您的 Cloudflare Worker 網址
const WORKER_URL = 'https://phos-detector-image.s10001049.workers.dev/';

let imgB64 = null;
let imgMime = null;

function setStage(s) {
  ['upload','preview','loading','error','result'].forEach(x => {
    document.getElementById('stage-' + x).style.display = x === s ? 'block' : 'none';
  });
}

function reset() {
  imgB64 = null;
  imgMime = null;
  document.getElementById('fi').value = '';
  document.getElementById('stage-result').innerHTML = '';
  ['s1','s2','s3','s4'].forEach(id => document.getElementById(id).className = 'step');
  setStage('upload');
}

function handleFile(file) {
  if (!file || !file.type.startsWith('image/')) return;
  const reader = new FileReader();
  reader.onload = e => {
    const src = e.target.result;
    const img = new Image();
    img.onload = () => {
      const maxSize = 1024;
      let w = img.width, h = img.height;
      if (w > maxSize || h > maxSize) {
        if (w > h) { h = Math.round(h * maxSize / w); w = maxSize; }
        else { w = Math.round(w * maxSize / h); h = maxSize; }
      }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      const compressed = canvas.toDataURL('image/jpeg', 0.85);
      imgB64 = compressed.split(',')[1];
      imgMime = 'image/jpeg';
      document.getElementById('pv-img').src = compressed;
      setStage('preview');
    };
    img.onerror = () => {
      imgB64 = src.split(',')[1];
      imgMime = file.type;
      document.getElementById('pv-img').src = src;
      setStage('preview');
    };
    img.src = src;
  };
  reader.readAsDataURL(file);
}

document.getElementById('fi').addEventListener('change', e => handleFile(e.target.files[0]));

const up = document.getElementById('stage-upload');
up.addEventListener('dragover', e => { e.preventDefault(); up.classList.add('drag'); });
up.addEventListener('dragleave', () => up.classList.remove('drag'));
up.addEventListener('drop', e => {
  e.preventDefault();
  up.classList.remove('drag');
  handleFile(e.dataTransfer.files[0]);
});

async function animSteps() {
  const ids = ['s1','s2','s3','s4'];
  for (let i = 0; i < ids.length; i++) {
    await new Promise(r => setTimeout(r, 600));
    if (i > 0) document.getElementById(ids[i-1]).className = 'step done';
    document.getElementById(ids[i]).className = 'step cur';
  }
}

async function analyze() {
  if (!imgB64) return;
  setStage('loading');
  animSteps();

  try {
    const res = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        image: imgB64,
        mime: imgMime
      })
    });

    if (!res.ok) {
      const errData = await res.json().catch(() => ({}));
      throw new Error(errData.error || `HTTP ${res.status}`);
    }

    const data = await res.json();
    if (data.error) throw new Error(data.error);

    const text = data.result || '';
    const match = text.match(/\{[\s\S]*\}/);
    if (!match) throw new Error('無法解析 AI 回應');

    const result = JSON.parse(match[0]);
    renderResult(result);
    setStage('result');

  } catch (e) {
    document.getElementById('err-det').textContent = e.message || '未知錯誤';
    setStage('error');
  }
}

function renderResult(r) {
  const cfg = {
    high: { ico: '🚨', lbl: 'HIGH RISK · 高磷警示' },
    medium: { ico: '⚠️', lbl: 'MODERATE · 中度風險' },
    low: { ico: '✅', lbl: 'SAFE · 低磷安全' }
  };
  const c = cfg[r.overallRisk] || cfg.medium;
  const pct = Math.min(((r.estimatedPhosphorus || 0) / 900) * 100, 100);
  const riskLabels = { high: '高磷', medium: '中磷', low: '低磷' };

  const foodsHTML = (r.foods || []).map(f => `
    <div class="food">
      <div class="fdot ${f.risk}"></div>
      <div class="fname">
        <div class="fname-t">${escape(f.name)}</div>
        <div class="fname-p">${escape(f.portion || '')}</div>
      </div>
      <div class="fphos">
        <div class="fphos-v">${Math.round(f.phosphorus)} mg</div>磷含量
      </div>
      <div class="ftag ${f.risk}">${riskLabels[f.risk] || '一般'}</div>
    </div>
  `).join('');

  const drugHTML = r.drugReminder ? `
    <div class="drug">
      <div class="drug-ico">💊</div>
      <div class="drug-t">
        此餐含中高磷食物，請記得<strong>隨第一口飯服用磷結合劑</strong>，切勿飯後補服。
      </div>
    </div>
  ` : '';

  const altsHTML = (r.alternatives || []).length > 0 ? `
    <div class="section-lbl">低磷替代建議</div>
    <div class="alts">
      ${r.alternatives.map(a => `
        <div class="alt">
          <div class="alt-h">▸ 建議替換</div>
          <div class="alt-n">${escape(a.replace)}</div>
          <div class="alt-d">替代「${escape(a.original)}」<br>${escape(a.reason)}</div>
        </div>
      `).join('')}
    </div>
  ` : '';

  document.getElementById('stage-result').innerHTML = `
    <div class="result">
      <div class="risk-banner ${r.overallRisk}">
        <div class="risk-ico">${c.ico}</div>
        <div>
          <div class="risk-label">${c.lbl}</div>
          <div class="risk-title">${escape(r.riskTitle || '')}</div>
          <div class="risk-sub">${escape(r.riskSummary || '')}</div>
        </div>
      </div>

      <div class="meter">
        <div class="meter-head">
          <span style="color:var(--muted)">估算磷攝取量（本餐）</span>
          <span style="font-weight:500;color:${r.overallRisk==='high'?'var(--danger)':r.overallRisk==='low'?'var(--safe)':'var(--gold)'}">${Math.round(r.estimatedPhosphorus || 0)} mg</span>
        </div>
        <div class="meter-bar">
          <div class="meter-fill ${r.overallRisk}" id="mf" style="width:0%"></div>
        </div>
        <div class="meter-marks">
          <span>0 mg</span><span>每日目標上限 900 mg</span>
        </div>
      </div>

      ${foodsHTML ? `<div><div class="section-lbl">辨識食物清單</div>${foodsHTML}</div>` : ''}

      ${drugHTML}

      <div class="advice">
        <div class="advice-h">▸ AI 飲食建議</div>
        <div class="advice-t">${escape(r.advice || '')}</div>
      </div>

      ${altsHTML}

      <button class="btn-ghost" style="width:100%;padding:14px;margin-top:4px;" onclick="reset()">📷 重新分析另一道餐點</button>
    </div>
  `;

  setTimeout(() => {
    const mf = document.getElementById('mf');
    if (mf) mf.style.width = pct + '%';
  }, 100);
}

function escape(s) {
  if (!s) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
</script>
</body>
</html>
